<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZIMU Capital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500&family=IBM+Plex+Mono:wght@400;500&family=Montserrat:wght@400;500;600;700;800&family=Quicksand:wght@500;600;700&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#17101F;
    --bg-2:#1F1730;
    --bone:#ECE6DA;
    --bone-dim:#A99FB0;
    --accent:#C79A5E;
    /* brand two-tone, lifted for legibility on the dark field */
    --zimu-maroon:#C0515B;
    --zimu-green:#4FA07C;
    --line:rgba(236,230,218,0.12);
    --ring:rgba(236,230,218,0.05);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--bone);
    font-family:"Hanken Grotesk",system-ui,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  .wrap{max-width:1120px;margin:0 auto;padding:0 32px}

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    min-height:88vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:120px 32px 80px;
    overflow:hidden;
  }
  /* concentric rectangles: 紫木 (purple wood) — frames, precision */
  .rings{
    position:absolute;
    top:46%;left:50%;
    transform:translate(-50%,-50%);
    width:min(140vw,1100px);
    height:min(140vw,1100px);
    pointer-events:none;
    z-index:0;
    opacity:0;
    animation:ringsIn 2.2s ease forwards .15s;
  }
  .rings rect{fill:none;stroke:var(--ring);stroke-width:1}
  .rings rect.accent{stroke:rgba(199,154,94,0.22)}

  .hero__inner{position:relative;z-index:1}

  .eyebrow{
    font-family:"IBM Plex Mono",monospace;
    font-size:12px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--bone-dim);
    margin-bottom:30px;
    opacity:0;animation:rise .9s ease forwards .25s;
  }
  /* wordmark — Helvetica (system); Arial is the near-identical fallback */
  .wordmark{
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    font-weight:600;
    font-size:clamp(38px,8.4vw,100px);
    line-height:1;
    letter-spacing:.04em;
    text-transform:uppercase;
    opacity:0;animation:rise 1s ease forwards .4s;
  }
  .wordmark .maroon{color:var(--bone)}
  .wordmark .green{color:var(--bone)}
  .han{
    display:block;
    height:clamp(34px,5vw,52px);
    width:auto;
    margin:20px auto 0;
    opacity:0;animation:rise 1s ease forwards .6s;
  }
  .locations{
    font-family:"IBM Plex Mono",monospace;
    font-size:clamp(12px,1.5vw,15px);
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--bone-dim);
    margin-top:40px;
    display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
    opacity:0;animation:rise 1s ease forwards .8s;
  }
  .locations .dot{color:var(--accent)}
  .tagline{
    max-width:520px;
    margin:36px auto 0;
    font-size:clamp(15px,1.8vw,17px);
    color:var(--bone-dim);
    line-height:1.65;
    opacity:0;animation:rise 1s ease forwards 1s;
  }

  /* ---------- PORTFOLIO ---------- */
  .portfolio{padding:40px 0 120px;position:relative;z-index:1}
  .section-rule{
    display:flex;align-items:center;gap:20px;
    margin-bottom:56px;
  }
  .section-rule .label{
    font-family:"IBM Plex Mono",monospace;
    font-size:12px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--bone-dim);white-space:nowrap;
  }
  .section-rule .line{flex:1;height:1px;background:var(--line)}

  .grid{
    display:flex;
    flex-wrap:wrap;
    gap:18px;
    justify-content:center;
  }
  .holding{
    flex:0 1 calc(33.333% - 12px);
    min-width:230px;
    background:#FBFAF7;
    border-radius:8px;
    min-height:168px;
    display:flex;align-items:center;justify-content:center;
    padding:34px;
    text-decoration:none;
    transition:transform .35s ease, box-shadow .35s ease;
    position:relative;
  }
  .holding:hover{transform:translateY(-4px);box-shadow:0 14px 34px rgba(0,0,0,.42)}

  /* Each card shows a real logo; if a file is missing it falls back to a
     styled wordmark. Logo files live in the logos/ folder. */
  .mark{
    font-family:"Montserrat",system-ui,sans-serif;
    font-weight:600;
    font-size:clamp(18px,2.4vw,24px);
    letter-spacing:.01em;
    color:#2A2733;
    text-align:center;
    line-height:1.1;
    transition:color .4s ease;
  }
  .mark--moore{font-weight:600;letter-spacing:.005em}
  .mark--landspace{font-weight:700;text-transform:uppercase;letter-spacing:.16em}
  .mark--momenta{
    font-family:"Quicksand",system-ui,sans-serif;
    font-weight:700;text-transform:lowercase;letter-spacing:0;
    font-size:clamp(20px,2.7vw,27px);
  }
  .mark--engineai{font-weight:600;letter-spacing:.01em}
  .mark--engineai b{font-weight:800}
  .mark--earendil{font-weight:500;text-transform:uppercase;letter-spacing:.3em;font-size:clamp(15px,2.1vw,21px)}
  .holding:hover .mark{color:var(--zimu-maroon)}
  /* logos sit on white cards in full brand color */
  .holding .logo{
    max-width:172px;max-height:66px;width:auto;height:auto;
    object-fit:contain;
  }

  /* corner tick accent on hover */
  .holding::after{
    content:"";position:absolute;top:14px;right:14px;
    width:6px;height:6px;border-radius:1px;
    background:var(--accent);
    opacity:0;transform:scale(.4);
    transition:opacity .4s ease, transform .4s ease;
  }
  .holding:hover::after{opacity:1;transform:scale(1)}

  /* ---------- FOOTER ---------- */
  footer{
    border-top:1px solid var(--line);
    padding:36px 0;
  }
  .footer-row{
    display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:16px;
    font-family:"IBM Plex Mono",monospace;
    font-size:12px;letter-spacing:.08em;
    color:var(--bone-dim);
  }
  .footer-row .name{color:var(--bone)}

  /* ---------- ANIMATION ---------- */
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes ringsIn{from{opacity:0;transform:translate(-50%,-50%) scale(.85)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

  @media (max-width:820px){
    .holding{flex-basis:calc(50% - 9px)}
  }
  @media (max-width:520px){
    .wrap{padding:0 22px}
    .hero{min-height:auto;padding:120px 22px 40px}
    .portfolio{padding:8px 0 64px}
    .holding{flex-basis:100%;min-height:140px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
    .eyebrow,.wordmark,.han,.locations,.tagline,.rings{opacity:1}
  }
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}
</style>
</head>
<body>

  <header class="hero">
    <svg class="rings" viewBox="0 0 600 600" aria-hidden="true">
      <rect x="210" y="260" width="180" height="80"/>
      <rect class="accent" x="150" y="235" width="300" height="130"/>
      <rect x="90" y="210" width="420" height="180"/>
      <rect x="30" y="184" width="540" height="232"/>
      <rect x="2" y="160" width="596" height="280"/>
    </svg>

    <div class="hero__inner">
      <h1 class="wordmark"><span class="maroon">ZIMU</span>&nbsp;<span class="green">CAPITAL</span></h1>
      <img class="han" src="logos/ZIMU.png" alt="紫木资本">

      <div class="locations">
        <span>Beijing</span><span class="dot">·</span>
        <span>Shanghai</span><span class="dot">·</span>
        <span>Hong Kong</span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="portfolio">
      <div class="section-rule">
        <span class="label">Portfolio</span>
        <span class="line"></span>
      </div>

      <div class="grid">
        <!-- Logo files live in the logos/ folder; each card falls back to a
             styled wordmark if its image is missing. -->
        <a class="holding"><img class="logo" src="logos/moore-threads.png" alt="Moore Threads" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="mark mark--moore" style="display:none">Moore Threads</span></a>
        <a class="holding"><img class="logo" src="logos/landspace.png" alt="LandSpace" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="mark mark--landspace" style="display:none">LandSpace</span></a>
        <a class="holding"><img class="logo" src="logos/momenta.png" alt="Momenta" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="mark mark--momenta" style="display:none">momenta</span></a>
        <a class="holding"><img class="logo" src="logos/engineai.png" alt="EngineAI" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="mark mark--engineai" style="display:none">Engine<b>AI</b></span></a>
        <a class="holding"><img class="logo" src="logos/earendil.png" alt="Earendil Labs" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="mark mark--earendil" style="display:none">Earendil</span></a>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap footer-row">
      <span class="name">ZIMU Capital · 紫木资本</span>
      <span>Beijing / Shanghai / Hong Kong</span>
    </div>
  </footer>

</body>
</html>
